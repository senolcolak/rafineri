version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rafineri-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rafineri
      POSTGRES_PASSWORD: rafineri
      POSTGRES_DB: rafineri
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rafineri"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rafineri-network

  redis:
    image: redis:7-alpine
    container_name: rafineri-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rafineri-network

  # Database migration/init container
  db-migrate:
    image: postgres:16-alpine
    container_name: rafineri-db-migrate
    restart: "no"
    volumes:
      - ./scripts:/scripts
    environment:
      - PGHOST=postgres
      - PGUSER=rafineri
      - PGPASSWORD=rafineri
      - PGDATABASE=rafineri
    command: >
      sh -c "
        echo '⏳ Waiting for PostgreSQL...' &&
        until pg_isready -h postgres -U rafineri 2>/dev/null; do
          sleep 1
        done &&
        echo '✓ PostgreSQL is ready' &&
        echo '📦 Running database setup...' &&
        psql -h postgres -U rafineri -d rafineri -f /scripts/setup-database.sql &&
        echo '✅ Database setup complete'
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rafineri-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: rafineri-api
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=rafineri
      - DB_PASSWORD=rafineri
      - DB_DATABASE=rafineri
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MOCK_MODE=${MOCK_MODE:-true}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-dev-admin-token}
      - RAFINERI_ADMIN=${RAFINERI_ADMIN:-admin}
      - RAFINERI_ADMIN_PASSWORD=${RAFINERI_ADMIN_PASSWORD:-changeme}
      - RAFINERI_ADMIN_URL=${RAFINERI_ADMIN_URL:-admin}
      - DATABASE_URL=postgresql://rafineri:rafineri@postgres:5432/rafineri
    ports:
      - "3001:3001"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - rafineri-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: rafineri-worker
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=rafineri
      - DB_PASSWORD=rafineri
      - DB_DATABASE=rafineri
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MOCK_MODE=${MOCK_MODE:-true}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID:-}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET:-}
      - REDDIT_USER_AGENT=${REDDIT_USER_AGENT:-Rafineri/1.0}
      - DATABASE_URL=postgresql://rafineri:rafineri@postgres:5432/rafineri
      - REDIS_URL=redis://redis:6379
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rafineri-network

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: rafineri-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      - NEXT_PUBLIC_RAFINERI_ADMIN_URL=${RAFINERI_ADMIN_URL:-admin}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - rafineri-network

volumes:
  postgres_data:
  redis_data:

networks:
  rafineri-network:
    driver: bridge
