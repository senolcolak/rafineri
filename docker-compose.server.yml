# =============================================================================
# Rafineri - Production Server Deployment
# =============================================================================
# This compose file is optimized for running on a single Linux VM.
# It includes restart policies, resource limits, health checks, and proper
# volume management for production use.
#
# Usage:
#   docker compose -f docker-compose.server.yml up -d --build
#   docker compose -f docker-compose.server.yml logs -f
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: rafineri-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rafineri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme-in-production}
      POSTGRES_DB: ${POSTGRES_DB:-rafineri}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"  # Only expose locally for security
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - rafineri-network

  # ===========================================================================
  # Redis Cache & Queue
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: rafineri-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"  # Only expose locally for security
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - rafineri-network

  # ===========================================================================
  # API Server
  # ===========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        - NODE_ENV=production
    container_name: rafineri-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rafineri}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-rafineri}
      - REDIS_URL=redis://redis:6379
      - MOCK_MODE=${MOCK_MODE:-true}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-change-this-in-production}
      - RAFINERI_ADMIN=${RAFINERI_ADMIN:-admin}
      - RAFINERI_ADMIN_PASSWORD=${RAFINERI_ADMIN_PASSWORD:-change-this-in-production}
      - RAFINERI_ADMIN_URL=${RAFINERI_ADMIN_URL:-admin}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID:-}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:3001:3001"  # Only expose locally, use reverse proxy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - rafineri-network

  # ===========================================================================
  # Background Worker
  # ===========================================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        - NODE_ENV=production
    container_name: rafineri-worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rafineri}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-rafineri}
      - REDIS_URL=redis://redis:6379
      - MOCK_MODE=${MOCK_MODE:-true}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID:-}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - rafineri-network

  # ===========================================================================
  # Web Frontend
  # ===========================================================================
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - NODE_ENV=production
    container_name: rafineri-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://api:3001}
      - NEXT_PUBLIC_RAFINERI_ADMIN_URL=${RAFINERI_ADMIN_URL:-admin}
      - PORT=3000
    ports:
      - "3000:3000"  # Expose to public
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - rafineri-network

  # ===========================================================================
  # Ollama AI Server (Optional - for local AI-powered news verification)
  # ===========================================================================
  # Uncomment this section to enable local AI using Ollama
  # Requires 4GB+ RAM (8GB+ recommended)
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: rafineri-ollama
  #   restart: unless-stopped
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   environment:
  #     - OLLAMA_KEEP_ALIVE=24h
  #     - OLLAMA_HOST=0.0.0.0
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '2.0'
  #         memory: 4G
  #       reservations:
  #         cpus: '0.5'
  #         memory: 2G
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 60s
  #   networks:
  #     - rafineri-network

  # ===========================================================================
  # Optional: Nginx Reverse Proxy (recommended for production)
  # ===========================================================================
  # Uncomment this section to use nginx as a reverse proxy with SSL
  #
  # nginx:
  #   image: nginx:alpine
  #   container_name: rafineri-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - web
  #     - api
  #   networks:
  #     - rafineri-network

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  # ollama_data:
  #   driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  rafineri-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
