# =============================================================================
# Rafineri Complete Stack with Ollama AI
# =============================================================================
# This file deploys the complete Rafineri stack including:
# - PostgreSQL database
# - Redis cache/queue
# - API server
# - Worker (with Ollama AI)
# - Ollama AI service
#
# Usage:
#   kubectl apply -f k8s/namespace.yaml
#   kubectl apply -f k8s/rafineri-with-ollama.yaml
#   kubectl apply -f k8s/ollama-model-init.yaml
#
# Port forward for local access:
#   kubectl port-forward svc/api 3001:3001 -n rafineri
#   kubectl port-forward svc/web 3000:3000 -n rafineri
#   kubectl port-forward svc/ollama 11434:11434 -n rafineri
# =============================================================================

---
# PostgreSQL Database
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: rafineri
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "rafineri"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rafineri-secrets
                  key: postgres-password
                  optional: true
            - name: POSTGRES_DB
              value: "rafineri"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          emptyDir: {}  # Use PVC for production

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: rafineri
spec:
  selector:
    app: postgres
  ports:
    - port: 5432

---
# Redis Cache/Queue
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: rafineri
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: rafineri
spec:
  selector:
    app: redis
  ports:
    - port: 6379

---
# Rafineri API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: rafineri
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z postgres 5432; do
                sleep 1
              done
              echo "PostgreSQL is ready!"
      containers:
        - name: api
          image: rafineri/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              value: "postgresql://rafineri:rafineri@postgres:5432/rafineri"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: OLLAMA_URL
              value: "http://ollama:11434"
            - name: AI_MODEL
              value: "llama3.2:3b"
            - name: USE_LOCAL_AI
              value: "true"
            - name: MOCK_MODE
              value: "false"
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rafineri-secrets
                  key: admin-token
                  optional: true
            - name: RAFINERI_ADMIN
              valueFrom:
                secretKeyRef:
                  name: rafineri-secrets
                  key: admin-username
                  optional: true
            - name: RAFINERI_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rafineri-secrets
                  key: admin-password
                  optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: rafineri
spec:
  selector:
    app: api
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP

---
# Rafineri Worker (with Ollama AI integration)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: rafineri
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z postgres 5432; do
                sleep 1
              done
              echo "PostgreSQL is ready!"
              
              echo "Waiting for Redis..."
              until nc -z redis 6379; do
                sleep 1
              done
              echo "Redis is ready!"
              
              echo "Waiting for Ollama..."
              until nc -z ollama 11434; do
                sleep 1
              done
              echo "Ollama is ready!"
      containers:
        - name: worker
          image: rafineri/worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              value: "postgresql://rafineri:rafineri@postgres:5432/rafineri"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: OLLAMA_URL
              value: "http://ollama:11434"
            - name: AI_MODEL
              value: "llama3.2:3b"
            - name: EMBEDDING_MODEL
              value: "nomic-embed-text"
            - name: USE_LOCAL_AI
              value: "true"
            - name: MOCK_MODE
              value: "false"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

---
# Rafineri Web Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: rafineri
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: rafineri/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_API_URL
              value: "http://api:3001"
            - name: NEXT_PUBLIC_RAFINERI_ADMIN_URL
              value: "admin"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: rafineri
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP

