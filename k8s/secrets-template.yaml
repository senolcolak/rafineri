# =============================================================================
# Rafineri Secrets Template
# =============================================================================
# IMPORTANT: Do not commit this file with real secrets to git!
# 
# Usage:
#   1. Copy this file: cp secrets-template.yaml secrets.yaml
#   2. Fill in your secrets
#   3. Apply: kubectl apply -f secrets.yaml
#   4. Delete the secrets.yaml file: rm secrets.yaml
#
# Or use: kubectl create secret generic rafineri-secrets --from-literal=key=value
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: rafineri-secrets
  namespace: rafineri
type: Opaque
stringData:
  # Database
  postgres-password: "change-me-in-production"
  
  # Admin credentials
  admin-token: "your-secure-admin-token-here"
  admin-username: "admin"
  admin-password: "change-me-in-production"
  
  # External APIs (optional)
  reddit-client-id: ""
  reddit-client-secret: ""
  openai-api-key: ""
  anthropic-api-key: ""
